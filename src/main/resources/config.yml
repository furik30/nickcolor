# =============================================
#  NickColor Plugin Configuration
#  Поддерживает форматирование MiniMessage.
#  Цвета и градиенты сохраняются в базе SQLite.
# =============================================

# Включить дебаг-режим? (Логирует SQL-запросы и подробные ошибки в консоль)
debug: false

# Пресеты для команды /nc presets
# Формат: <имя_пресета>: "<hex1>:<hex2>" (для градиента) или "<hex>" (для сплошного)
presets:
  fire: "#FF0000:#FFA500"
  ocean: "#0000FF:#00FFFF"
  emerald: "#00FF00:#00AA00"
  sunset: "#FF4500:#FFD700"
  ruby: "#E0115F"
  sapphire: "#0F52BA"

# Сообщения плагина (Поддерживается MiniMessage!)
messages:
  # Помощь по командам (/nc help)
  help: |
    <gold><b>Справка по плагину NickColor:</b></gold>
    <gray>/nc <hex> <white>- Установить цвет (например: #FF5555)</white>
    <gray>/nc <hex1>:<hex2> <white>- Установить градиент (например: #FF0000:#00FF00)</white>
    <gray>/nc random <white>- Установить случайный цвет</white>
    <gray>/nc random gradient <white>- Установить случайный градиент</white>
    <gray>/nc presets <white>- Открыть меню готовых пресетов</white>
    <gray>/nc reset <white>- Сбросить цвет ника</white>

  # Успешные операции
  color-changed: "<green>Ваш цвет ника изменён на: {color}</green>"
  gradient-applied: "<green>Ваш градиент изменён на: {gradient}</green>"
  color-reset: "<green>Ваш цвет ника сброшен.</green>"
  reloaded: "<green>Конфигурация плагина NickColor успешно перезагружена!</green>"

  # Ошибки и системные сообщения
  no-permission: "<red>У вас нет прав на использование этой команды!</red>"
  player-only: "<red>Эту команду могут использовать только игроки!</red>"
  invalid-hex: "<red>Неверный формат HEX-кода! Пример: #FF5555</red>"
  invalid-gradient: "<red>Неверный формат градиента! Пример: #FF0000:#00FF00</red>"
  player-not-found: "<red>Игрок не найден или не в сети!</red>"

  # Пресеты
  no-presets: "<red>Пресеты не настроены в конфигурации!</red>"
  presets-header: "<gold><b>Доступные пресеты (нажмите, чтобы выбрать):</b></gold>"
