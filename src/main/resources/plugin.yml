name: NickColorPlugin
version: 1.0.0
main: me.meldot.nickcolor.NickColorPlugin
api-version: '1.21'
description: Плагин для установки цвета и градиента ника (Chat, TabList, NameTag)
author: Jules
website: https://github.com/

# Зависимости
depend: [PlaceholderAPI]

# Команды
commands:
  nickcolor:
    description: Основная команда для управления цветом ника
    usage: |
      <red>Использование:</red>
      <gray>/nickcolor <цвет> <white>- Изменить цвет ника</white>
      <gray>/nickcolor <цвет1>:<цвет2> <white>- Градиент</white>
    aliases: [nc, color, nickc]
    permission: nickcolor.use

# Права (Permissions)
permissions:
  nickcolor.use:
    description: Позволяет использовать базовые команды (/nc, /nc <hex>, /nc gradient, /nc random, /nc presets)
    default: true

  nickcolor.admin.set:
    description: Позволяет изменять цвет другим игрокам (/nc set <игрок> <цвет>)
    default: op

  nickcolor.admin.reload:
    description: Позволяет перезагружать конфиг (/nc reload)
    default: op

  nickcolor.*:
    description: Дает все права плагина
    default: op
    children:
      nickcolor.use: true
      nickcolor.admin.set: true
      nickcolor.admin.reload: true
